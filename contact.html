<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Albert M. Gerona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #030712;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Entrance Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation */
        .top-nav {
            background: #030712;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }
        .nav-container { max-width: 800px; margin: 0 auto; padding: 0 10px; }
        .nav-menu { display: flex; list-style: none; justify-content: center; flex-wrap: nowrap; }
        .nav-menu a { 
            padding: 15px 20px; 
            text-decoration: none; 
            color: #ffffff; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
        }
        .nav-menu a.active, .nav-menu a:hover { 
            color: #22d3ee; 
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
        }

        .main-content { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px 20px; 
            animation: fadeInUp 0.8s ease-out; /* Page entry animation */
        }
        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 40px; }
        h1 span { color: #22d3ee; }

        /* Contact Grid */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .contact-card {
            background: #111827;
            border: 1px solid #1f2937;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Restored Hover effect without removing original properties */
        .contact-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: #22d3ee; 
            background: #1a2233;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .contact-card i { 
            font-size: 2rem; 
            color: #22d3ee; 
            margin-bottom: 15px; 
            transition: transform 0.3s ease;
        }
        .contact-card:hover i { transform: scale(1.2); }
        
        .contact-card h3 { font-size: 1.1rem; margin-bottom: 10px; }

        /* Gmail Link Styling */
        .gmail-link {
            color: #9ca3af;
            text-decoration: none;
            cursor: pointer;
            word-break: break-all;
            transition: 0.3s;
            font-size: 0.95rem;
        }
        .gmail-link:hover { color: #22d3ee; text-decoration: underline; }

        /* Buttons */
        .copy-btn {
            margin-top: 12px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid #22d3ee;
            color: #22d3ee;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .copy-btn:hover { background: #22d3ee; color: #030712; }
        .copy-btn:active { transform: scale(0.95); }

        .feedback-msg {
            display: none;
            color: #22d3ee;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .nav-menu a { padding: 12px 8px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <h1>Get In <span>Touch</span></h1>

        <div class="contact-grid">
            <div class="contact-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=albertgerona20@gmail.com" 
                   target="_blank" 
                   class="gmail-link" 
                   id="emailAddr">
                    albertgerona20@gmail.com
                </a>
                <button class="copy-btn" onclick="copyText('emailAddr', 'emailFeedback')">Copy Email</button>
                <span id="emailFeedback" class="feedback-msg">Copied!</span>
            </div>

            <div class="contact-card">
                <i class="fas fa-phone"></i>
                <h3>Phone</h3>
                <p id="phoneNumber">+63 946 376 8725</p>
                <button class="copy-btn" onclick="copyText('phoneNumber', 'phoneFeedback')">Copy Number</button>
                <span id="phoneFeedback" class="feedback-msg">Copied!</span>
            </div>

            <div class="contact-card">
                <i class="fas fa-location-dot"></i>
                <h3>Location</h3>
                <p>Bulan Sorsogon, Bicol, Philippines</p>
            </div>
        </div>
    </div>

    <script>
        function copyText(elementId, feedbackId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const feedback = document.getElementById(feedbackId);
                feedback.style.display = 'block';
                setTimeout(() => feedback.style.display = 'none', 2000);
            });
        }
    </script>
</body>
</html>
